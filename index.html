<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Catcher Pro - Real Experience</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            color: white; 
            flex-direction: column;
            overflow: hidden;
            padding: 10px; 
            box-sizing: border-box;
            user-select: none;
        }

        .screen { display: none; width: 100%; max-width: 400px; text-align: center; }
        .screen.active { display: flex; flex-direction: column; align-items: center; }

        h1 { font-size: 32px; color: #00ffcc; text-shadow: 0 0 20px #00ffcc; margin: 10px 0; letter-spacing: 2px;}
        h2 { font-size: 24px; color: #ffd700; text-shadow: 0 0 10px #ffd700; margin: 10px 0;}
        
        .wallet-display {
            background: rgba(0,0,0,0.6); padding: 10px 25px; border-radius: 25px;
            font-size: 20px; color: #00ffcc; border: 1px solid #00ffcc; margin: 15px 0;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        .btn {
            width: 80%; padding: 15px; margin: 10px 0; font-size: 18px; font-weight: bold;
            border: none; border-radius: 10px; cursor: pointer; transition: all 0.2s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: linear-gradient(45deg, #00ffcc, #00b399); color: black; box-shadow: 0 4px 15px rgba(0, 255, 204, 0.4); }
        .btn-secondary { background: #222; color: #aaa; border: 1px solid #444; }
        .btn-gold { background: linear-gradient(45deg, #ffd700, #ff8c00); color: black; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4); }

        .shop-item {
            background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 10px;
            padding: 15px; margin: 10px 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
        }
        .shop-item-info { text-align: left; }
        .shop-item-title { font-size: 18px; font-weight: bold; color: white; }
        .shop-item-desc { font-size: 12px; color: #888; }

        #game-ui { margin-bottom: 10px; font-size: 16px; font-weight: bold; width: 100%; max-width: 400px; display: flex; justify-content: space-between; }
        #level-display { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        
        canvas { 
            border: 2px solid #00ffcc; border-radius: 15px; 
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.3); max-width: 100%; max-height: 70vh; touch-action: none; 
        }

        .overlay {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(5, 10, 15, 0.95); padding: 30px; border-radius: 20px; text-align: center;
            border: 2px solid #00ffcc; box-shadow: 0 0 50px rgba(0, 255, 204, 0.5); z-index: 100;
            width: 85%; max-width: 320px; backdrop-filter: blur(10px);
        }
        .overlay.active { display: block; }

        /* --- TOAST NOTIFICATIONS --- */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: rgba(0,0,0,0.9); color: white; padding: 12px 24px; border-radius: 25px; font-weight: bold; border: 1px solid #00ffcc; animation: slideDown 0.3s ease, fadeOut 0.5s ease 2.5s forwards; }
        .toast.gold { border-color: #ffd700; color: #ffd700; }
        .toast.red { border-color: #ff4444; color: #ff4444; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-20px); } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="start-screen" class="screen active">
        <h1>COIN CATCHER</h1>
        <p style="color: #888;">Real Experience Edition</p>
        <div class="wallet-display">WALLET: ₹<span id="menu-wallet">0.00</span></div>
        <p style="color: #aaa; font-size: 14px;">HIGH SCORE: <span id="high-score" style="color: gold;">0</span></p>
        <button class="btn btn-primary" onclick="startGame()">▶ PLAY GAME</button>
        <button class="btn btn-gold" onclick="showScreen('shop-screen')">🛒 UPGRADE SHOP</button>
    </div>

    <div id="shop-screen" class="screen">
        <h2>UPGRADE SHOP</h2>
        <div class="wallet-display">BALANCE: ₹<span id="shop-wallet">0.00</span></div>
        
        <div class="shop-item">
            <div class="shop-item-info">
                <div class="shop-item-title">🛡️ SHIELD</div>
                <div class="shop-item-desc">Survive 1 bomb hit.</div>
            </div>
            <button class="btn btn-primary" style="width: auto; padding: 10px 20px; margin:0;" onclick="buyItem('shield', 50)">₹50</button>
        </div>

        <div class="shop-item">
            <div class="shop-item-info">
                <div class="shop-item-title">🧲 MAGNET</div>
                <div class="shop-item-desc">Attract coins for 10s.</div>
            </div>
            <button class="btn btn-primary" style="width: auto; padding: 10px 20px; margin:0;" onclick="buyItem('magnet', 100)">₹100</button>
        </div>

        <button class="btn btn-secondary" onclick="showScreen('start-screen')" style="margin-top: 20px;">← BACK TO MENU</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-ui">
            <div>SCORE: <span id="score" style="color: gold;">0</span></div>
            <div id="level-display">LVL 1</div>
            <div>LIVES: <span id="lives" style="color: #ff4444;">3</span></div>
        </div>
        <canvas id="game" width="400" height="600"></canvas>
    </div>

    <div id="game-over-overlay" class="overlay">
        <h2 style="color: #ff4444; text-shadow: 0 0 10px red;">CRASHED!</h2>
        <p style="font-size: 18px; color: #ccc;">Score: <span id="final-score" style="color: gold; font-weight: bold;">0</span></p>
        <button class="btn btn-gold" id="revive-btn">▶ WATCH AD (+₹10)</button>
        <button class="btn btn-secondary" onclick="goHome()">🏠 HOME</button>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let wallet = parseFloat(localStorage.getItem('wallet')) || 0.00;
        let highScore = parseInt(localStorage.getItem('highScore')) || 0;
        
        let score = 0, lives = 3, gameOver = false, itemSpeed = 4;
        let comboMultiplier = 1, comboTimer = 0;
        let shakeTime = 0, shakeMagnitude = 0;
        let flashTimer = 0;
        let level = 1, levelUpTimer = 0;
        
        let hasShield = false, hasMagnet = false;
        let magnetTimer = 0;

        const player = { x: 175, y: 550, width: 50, height: 15, speed: 7 };
        let keys = {};
        let items = [], particles = [], stars = [];

        // --- PARALLAX STARFIELD ---
        for(let i=0; i<80; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2 + 0.5, speed: Math.random() * 2 + 0.5 });
        }

        // --- AUDIO & HAPTICS ---
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(freq, type, duration) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.value = freq;
            gain.gain.value = 0.1;
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        function vibrate(pattern) { if (navigator.vibrate) navigator.vibrate(pattern); }

        // --- UI & TOASTS ---
        function showToast(msg, type = '') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            updateWalletDisplays();
        }

        function updateWalletDisplays() {
            document.getElementById('menu-wallet').innerText = wallet.toFixed(2);
            document.getElementById('shop-wallet').innerText = wallet.toFixed(2);
            document.getElementById('high-score').innerText = highScore;
        }

        function saveData() {
            localStorage.setItem('wallet', wallet);
            localStorage.setItem('highScore', highScore);
        }

        function buyItem(type, cost) {
            initAudio();
            if (wallet >= cost) {
                wallet -= cost;
                if (type === 'shield') hasShield = true;
                if (type === 'magnet') hasMagnet = true;
                playSound(800, 'sine', 0.2);
                vibrate(50);
                saveData();
                updateWalletDisplays();
                showToast(`Purchased ${type.toUpperCase()}!`, 'gold');
            } else {
                playSound(200, 'square', 0.3);
                vibrate([50, 30, 50]);
                showToast("Not enough balance!", 'red');
            }
        }

        function startGame() {
            initAudio();
            showScreen('game-screen');
            score = 0; lives = 3; gameOver = false; itemSpeed = 4; level = 1;
            comboMultiplier = 1; comboTimer = 0;
            items = []; particles = [];
            magnetTimer = hasMagnet ? 600 : 0;
            
            document.getElementById('score').innerText = score;
            document.getElementById('lives').innerText = lives;
            document.getElementById('level-display').innerText = 'LVL 1';
            document.getElementById('game-over-overlay').classList.remove('active');
            requestAnimationFrame(loop);
        }

        function goHome() {
            if (score > highScore) highScore = score;
            saveData();
            showScreen('start-screen');
        }

        document.addEventListener('keydown', e => keys[e.key] = true);
        document.addEventListener('keyup', e => keys[e.key] = false);
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            player.x = (touch.clientX - rect.left) * (canvas.width / rect.width) - player.width / 2;
        });

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({ x, y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8, life: 1.0, color, size: Math.random() * 4 + 2 });
            }
        }

        function update() {
            if (gameOver) return;

            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) player.x += player.speed;

            // Update Stars
            stars.forEach(s => { s.y += s.speed + (itemSpeed * 0.2); if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; } });

            if (magnetTimer > 0) { magnetTimer--; if (magnetTimer === 0) hasMagnet = false; }
            if (comboTimer > 0) { comboTimer--; if (comboTimer === 0) comboMultiplier = 1; }
            if (levelUpTimer > 0) levelUpTimer--;

            // Level Progression
            let newLevel = Math.floor(score / 500) + 1;
            if (newLevel > level) {
                level = newLevel;
                levelUpTimer = 120;
                itemSpeed += 1;
                document.getElementById('level-display').innerText = `LVL ${level}`;
                vibrate([50, 50, 50, 50, 200]);
                showToast(`LEVEL ${level} REACHED!`, 'gold');
            }

            if (Math.random() < 0.03 + (level * 0.005)) { 
                const isBomb = Math.random() > 0.75; 
                items.push({ x: Math.random() * (canvas.width - 20), y: -20, width: 20, height: 20, isBomb, pulse: 0 });
            }

            for (let i = items.length - 1; i >= 0; i--) {
                items[i].y += itemSpeed;
                items[i].pulse += 0.1;

                if (!items[i].isBomb && magnetTimer > 0) {
                    let dx = (player.x + player.width/2) - (items[i].x + 10);
                    let dy = (player.y) - (items[i].y + 10);
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 200) { items[i].x += (dx / dist) * 5; items[i].y += (dy / dist) * 5; }
                }

                if (items[i].y + items[i].height >= player.y &&
                    items[i].x + items[i].width >= player.x &&
                    items[i].x <= player.x + player.width) {

                    if (items[i].isBomb) {
                        if (hasShield) {
                            hasShield = false;
                            createParticles(items[i].x + 10, items[i].y + 10, '#00ffcc', 20);
                            playSound(400, 'triangle', 0.2);
                            vibrate(30);
                        } else {
                            lives--;
                            createParticles(items[i].x + 10, items[i].y + 10, '#ff0000', 25);
                            shakeMagnitude = 15; shakeTime = 20; flashTimer = 15;
                            playSound(100, 'sawtooth', 0.4);
                            vibrate([100, 50, 100]);
                            if (lives <= 0) { gameOver = true; showGameOver(); }
                        }
                    } else {
                        let points = 10 * comboMultiplier;
                        score += points;
                        wallet += (0.10 * comboMultiplier); 
                        createParticles(items[i].x + 10, items[i].y + 10, '#ffd700', 15);
                        playSound(600 + comboMultiplier*100, 'sine', 0.1);
                        vibrate(15);
                        
                        comboTimer = 60;
                        if (comboMultiplier < 5) comboMultiplier++;
                    }
                    items.splice(i, 1);
                } 
                else if (items[i].y > canvas.height) {
                    if (!items[i].isBomb) {
                        lives--; comboMultiplier = 1;
                        playSound(150, 'square', 0.2);
                        if (lives <= 0) { gameOver = true; showGameOver(); }
                    }
                    items.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.03;
                if (p.life <= 0) particles.splice(i, 1);
            }

            document.getElementById('score').innerText = score;
            document.getElementById('lives').innerText = lives;
        }

        function draw() {
            ctx.save();
            if (shakeTime > 0) {
                ctx.translate(Math.random() * shakeMagnitude - shakeMagnitude/2, Math.random() * shakeMagnitude - shakeMagnitude/2);
                shakeTime--;
            }

            // Dynamic Background based on Level
            let bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            if (level === 1) { bgGrad.addColorStop(0, '#050a10'); bgGrad.addColorStop(1, '#1a2a3a'); }
            else if (level === 2) { bgGrad.addColorStop(0, '#100520'); bgGrad.addColorStop(1, '#3a1a4a'); }
            else { bgGrad.addColorStop(0, '#200505'); bgGrad.addColorStop(1, '#4a1a1a'); }
            ctx.fillStyle = bgGrad;
            ctx.fillRect(-20, -20, canvas.width + 40, canvas.height + 40);

            // Draw Stars
            ctx.fillStyle = 'white';
            stars.forEach(s => { ctx.globalAlpha = s.size / 2.5; ctx.fillRect(s.x, s.y, s.size, s.size); });
            ctx.globalAlpha = 1.0;

            // Draw Player (Hoverboard)
            ctx.save();
            ctx.translate(player.x + player.width/2, player.y + player.height/2);
            let trailGrad = ctx.createLinearGradient(0, 0, 0, 30);
            trailGrad.addColorStop(0, hasShield ? 'rgba(255, 215, 0, 0.8)' : 'rgba(0, 255, 204, 0.8)');
            trailGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = trailGrad;
            ctx.fillRect(-player.width/2, 0, player.width, 30);
            
            ctx.shadowBlur = 20; ctx.shadowColor = hasShield ? '#ffd700' : '#00ffcc';
            ctx.fillStyle = hasShield ? '#ffd700' : '#00ffcc';
            ctx.beginPath();
            ctx.ellipse(0, 0, player.width/2, player.height/2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#050a10';
            ctx.beginPath();
            ctx.ellipse(0, -2, 10, 5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Draw Items
            items.forEach(item => {
                ctx.save();
                ctx.translate(item.x + 10, item.y + 10);
                if (item.isBomb) {
                    ctx.rotate(-item.pulse * 0.5);
                    ctx.shadowBlur = 15; ctx.shadowColor = '#ff0000';
                    ctx.fillStyle = '#4a0000';
                    for (let i = 0; i < 8; i++) { ctx.save(); ctx.rotate((Math.PI * 2 / 8) * i); ctx.fillRect(-3, -15, 6, 10); ctx.restore(); }
                    let bombGrad = ctx.createRadialGradient(0, 0, 2, 0, 0, 10);
                    bombGrad.addColorStop(0, '#ff4444'); bombGrad.addColorStop(1, '#8b0000');
                    ctx.fillStyle = bombGrad;
                    ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + Math.sin(item.pulse * 2) * 0.5})`;
                    ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
                } else {
                    ctx.rotate(item.pulse);
                    let coinGrad = ctx.createRadialGradient(0, 0, 2, 0, 0, 12);
                    coinGrad.addColorStop(0, '#fff59d'); coinGrad.addColorStop(0.5, '#ffd700'); coinGrad.addColorStop(1, '#b8860b');
                    ctx.fillStyle = coinGrad;
                    ctx.shadowBlur = 15; ctx.shadowColor = '#ffd700';
                    ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#b8860b'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('₹', 0, 1);
                }
                ctx.restore();
            });

            // Draw Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.globalAlpha = 1.0;
            });

            // Screen Flash on Bomb Hit
            if (flashTimer > 0) {
                ctx.fillStyle = `rgba(255, 0, 0, ${flashTimer / 30})`;
                ctx.fillRect(-20, -20, canvas.width + 40, canvas.height + 40);
                flashTimer--;
            }

            // Level Up Text Animation
            if (levelUpTimer > 0) {
                ctx.globalAlpha = levelUpTimer / 120;
                ctx.fillStyle = '#ff00ff';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 20; ctx.shadowColor = '#ff00ff';
                ctx.fillText(`LEVEL ${level}`, canvas.width/2, canvas.height/2);
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1.0;
            }

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            if (!gameOver) requestAnimationFrame(loop);
        }

        function showGameOver() {
            if (score > highScore) highScore = score;
            saveData();
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over-overlay').classList.add('active');
        }

        document.getElementById('revive-btn').addEventListener('click', () => {
            let btn = document.getElementById('revive-btn');
            let timer = 5;
            btn.innerText = `Watching Ad... ${timer}s`;
            btn.style.background = '#555';
            
            const interval = setInterval(() => {
                timer--;
                if (timer > 0) {
                    btn.innerText = `Watching Ad... ${timer}s`;
                } else {
                    clearInterval(interval);
                    wallet += 10.00; 
                    lives = 1; gameOver = false; itemSpeed = 4; items = [];
                    document.getElementById('game-over-overlay').classList.remove('active');
                    btn.innerText = '▶ WATCH AD (+₹10)';
                    btn.style.background = 'linear-gradient(45deg, #ffd700, #ff8c00)';
                    saveData();
                    showToast("Revived! +₹10 Added", 'gold');
                    requestAnimationFrame(loop);
                }
            }, 1000);
        });

        updateWalletDisplays();
    </script>
</body>
</html>
