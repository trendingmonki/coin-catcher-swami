<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Catcher - Swami's Empire</title>
    <style>
        body { 
            margin: 0; 
            background: #1a1a1a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: 'Segoe UI', sans-serif; 
            color: white; 
            flex-direction: column;
            overflow: hidden;
        }
        #ui { 
            margin-bottom: 15px; 
            font-size: 24px; 
            font-weight: bold;
            letter-spacing: 2px;
        }
        canvas { 
            background: #0d0d0d; 
            border: 3px solid #00ffcc; 
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
            max-width: 100%;
            touch-action: none; /* Prevents scrolling on mobile */
        }
        #instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="ui">COINS: <span id="score" style="color: gold;">0</span> | LIVES: <span id="lives" style="color: #ff4444;">3</span></div>
    <canvas id="game" width="400" height="600"></canvas>
    <div id="instructions">Use Arrow Keys (PC) or Touch/Drag (Mobile)</div>

    <script>
        // --- SETUP ---
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let lives = 3;
        let gameOver = false;
        let itemSpeed = 4;

        // Player (The Bucket)
        const player = { x: 180, y: 550, width: 50, height: 20, speed: 6 };
        let keys = {};

        // Falling items array
        let items = [];

        // --- CONTROLS ---
        document.addEventListener('keydown', e => keys[e.key] = true);
        document.addEventListener('keyup', e => keys[e.key] = false);

        // Mobile Touch Controls
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            // Map touch position to canvas position
            player.x = (touch.clientX - rect.left) * (canvas.width / rect.width) - player.width / 2;
        });

        // Restart on click/touch if game over
        canvas.addEventListener('click', () => {
            if (gameOver) resetGame();
        });
        canvas.addEventListener('touchstart', () => {
            if (gameOver) resetGame();
        });

        // --- GAME LOGIC ---
        function spawnItem() {
            if (gameOver) return;
            const isBomb = Math.random() > 0.75; // 25% chance to spawn a bomb
            items.push({
                x: Math.random() * (canvas.width - 20),
                y: -20,
                width: 20,
                height: 20,
                isBomb: isBomb,
                color: isBomb ? '#ff3333' : '#ffd700' // Red for bomb, Gold for coin
            });
        }

        function resetGame() {
            score = 0;
            lives = 3;
            gameOver = false;
            items = [];
            itemSpeed = 4;
            document.getElementById('score').innerText = score;
            document.getElementById('lives').innerText = lives;
        }

        function update() {
            if (gameOver) return;

            // Move Player (Keyboard)
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) player.x += player.speed;

            // Keep player in bounds
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

            // Move Items & Check Collisions
            for (let i = 0; i < items.length; i++) {
                items[i].y += itemSpeed;

                // Collision with player
                if (items[i].y + items[i].height >= player.y &&
                    items[i].x + items[i].width >= player.x &&
                    items[i].x <= player.x + player.width) {

                    if (items[i].isBomb) {
                        lives--;
                        if (lives <= 0) gameOver = true;
                    } else {
                        score += 10;
                        // Increase difficulty slightly as score goes up
                        if (score % 100 === 0) itemSpeed += 0.5; 
                    }
                    items.splice(i, 1);
                    i--;
                } 
                // Missed the item (Fell off screen)
                else if (items[i].y > canvas.height) {
                    if (!items[i].isBomb) {
                        lives--; // Punish for missing a coin
                        if (lives <= 0) gameOver = true;
                    }
                    items.splice(i, 1);
                    i--;
                }
            }

            // Update UI
            document.getElementById('score').innerText = score;
            document.getElementById('lives').innerText = lives;
        }

        function draw() {
            // Clear screen
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Player
            ctx.fillStyle = '#00ffcc';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            // Player detail
            ctx.fillStyle = '#00b399';
            ctx.fillRect(player.x + 5, player.y + 5, player.width - 10, 10);

            // Draw Items
            items.forEach(item => {
                ctx.fillStyle = item.color;
                ctx.beginPath();
                ctx.arc(item.x + 10, item.y + 10, 12, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw a little symbol inside
                ctx.fillStyle = '#000';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(item.isBomb ? 'X' : '₹', item.x + 10, item.y + 15);
            });

            // Draw Game Over Screen
            if (gameOver) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#ff4444';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width / 2, 280);

                ctx.fillStyle = 'white';
                ctx.font = '24px Arial';
                ctx.fillText('Score: ' + score, canvas.width / 2, 320);

                ctx.fillStyle = '#00ffcc';
                ctx.font = '18px Arial';
                ctx.fillText('TAP / CLICK TO PLAY AGAIN', canvas.width / 2, 370);
                
                // THIS IS WHERE WE WILL PUT THE "WATCH AD TO REVIVE" BUTTON LATER
            }
        }

        // --- MAIN LOOP ---
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Spawn items every 800ms
        setInterval(spawnItem, 800);
        
        // Start the game
        loop();
    </script>
</body>
</html>
