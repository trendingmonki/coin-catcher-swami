<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Catcher - Ultimate Platform</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; 
            color: white; 
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #app {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a2e 100%);
        }

        #splash-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #00ffcc 0%, #00b399 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeOut 0.5s ease 2s forwards;
        }

        #splash-screen h1 {
            font-size: 48px;
            color: #000;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
            animation: bounce 1s ease infinite;
        }

        #splash-screen p {
            color: rgba(0,0,0,0.6);
            font-size: 18px;
            margin-top: 10px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes fadeOut {
            to { opacity: 0; pointer-events: none; }
        }

        .screen { 
            display: none; 
            width: 100%; 
            height: 100%;
            flex-direction: column;
            position: absolute;
            top: 0;
            left: 0;
            overflow-y: auto;
        }
        .screen.active { display: flex; }

        #auth-screen {
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        .auth-box h2 {
            text-align: center;
            color: #00ffcc;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #888;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0,255,204,0.3);
        }

        .btn {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary { 
            background: linear-gradient(135deg, #00ffcc 0%, #00b399 100%); 
            color: #000;
        }

        .btn-google {
            background: white;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-text {
            background: none;
            color: #00ffcc;
            text-transform: none;
            letter-spacing: 0;
            font-weight: normal;
        }

        .divider {
            text-align: center;
            color: #666;
            margin: 20px 0;
            position: relative;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        #home-screen {
            padding: 20px;
            padding-bottom: 80px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #00ffcc;
        }

        .wallet-card {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(255,215,0,0.3);
        }

        .wallet-card h3 {
            color: rgba(0,0,0,0.6);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .wallet-card .amount {
            font-size: 48px;
            font-weight: bold;
            color: #000;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #00ffcc;
            margin-bottom: 5px;
        }

        .stat-card .label {
            color: #888;
            font-size: 14px;
        }

        .play-btn {
            width: 100%;
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #00ffcc 0%, #00b399 100%);
            color: #000;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,255,204,0.4);
        }

        #game-screen { padding: 0; }

        #game-hud {
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        #game-canvas {
            width: 100%;
            flex: 1;
            display: block;
            touch-action: none;
            background: #0a0a1a;
        }

        #leaderboard-screen {
            padding: 20px;
            padding-bottom: 80px;
        }

        .leaderboard-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .leaderboard-header h2 {
            color: #ffd700;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .leaderboard-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .leaderboard-item.top-3 {
            background: linear-gradient(135deg, rgba(255,215,0,0.2) 0%, rgba(255,140,0,0.2) 100%);
            border-color: #ffd700;
        }

        .rank {
            font-size: 24px;
            font-weight: bold;
            color: #888;
            min-width: 40px;
        }

        .leaderboard-item.top-3 .rank {
            color: #ffd700;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .player-level {
            font-size: 12px;
            color: #888;
        }

        .player-score {
            font-size: 20px;
            font-weight: bold;
            color: #00ffcc;
        }

        #profile-screen {
            padding: 20px;
            padding-bottom: 80px;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ffcc 0%, #00b399 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(0,255,204,0.3);
        }

        .profile-header h2 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .profile-header p {
            color: #888;
            font-size: 14px;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .profile-stat {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .profile-stat .value {
            font-size: 28px;
            font-weight: bold;
            color: #00ffcc;
            margin-bottom: 5px;
        }

        .profile-stat .label {
            color: #888;
            font-size: 12px;
        }

        #bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(10,10,26,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 50;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.2s;
            color: #666;
        }

        .nav-item.active {
            color: #00ffcc;
        }

        .nav-item .icon {
            font-size: 24px;
        }

        .nav-item .label {
            font-size: 12px;
            font-weight: bold;
        }

        .overlay {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay.active { display: flex; }

        .overlay-content {
            background: rgba(10,10,30,0.95);
            border: 2px solid #00ffcc;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,255,204,0.5);
            max-width: 350px;
        }

        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: rgba(0,0,0,0.95);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            border: 2px solid #00ffcc;
            animation: slideIn 0.3s ease, fadeOut 0.5s ease 2.5s forwards;
        }

        .toast.gold { border-color: #ffd700; color: #ffd700; }
        .toast.red { border-color: #ff4444; color: #ff4444; }

        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-30px); }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="splash-screen">
        <h1>COIN CATCHER</h1>
        <p>ULTIMATE PLATFORM</p>
    </div>

    <div id="toast-container"></div>

    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <h2 id="auth-title">LOGIN</h2>
            
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email-input" placeholder="your@email.com">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password-input" placeholder="••••••••">
            </div>
            
            <button class="btn btn-primary" id="auth-btn" onclick="Auth.submit()">LOGIN</button>
            
            <div class="divider">OR</div>
            
            <button class="btn btn-google" onclick="Auth.google()">
                <span style="font-size: 20px;">G</span>
                Continue with Google
            </button>
            
            <button class="btn btn-text" id="toggle-auth-btn" onclick="Auth.toggleMode()">
                Don't have an account? Register
            </button>
        </div>
    </div>

    <div id="home-screen" class="screen">
        <div class="header">
            <h1>HOME</h1>
        </div>
        
        <div class="wallet-card">
            <h3>WALLET BALANCE</h3>
            <div class="amount">₹<span id="home-wallet">0.00</span></div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="value" id="home-highscore">0</div>
                <div class="label">HIGH SCORE</div>
            </div>
            <div class="stat-card">
                <div class="value" id="home-games">0</div>
                <div class="label">GAMES PLAYED</div>
            </div>
        </div>
        
        <button class="play-btn" onclick="Game.start()">▶ PLAY NOW</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-hud">
            <div>SCORE: <span id="score" style="color: #ffd700;">0</span></div>
            <div id="level-display" style="color: #ff00ff;">LVL 1</div>
            <div>LIVES: <span id="lives" style="color: #ff4444;">3</span></div>
        </div>
        <canvas id="game-canvas"></canvas>
    </div>

    <div id="leaderboard-screen" class="screen">
        <div class="leaderboard-header">
            <h2>🏆 LEADERBOARD</h2>
            <p style="color: #888;">Top Players This Week</p>
        </div>
        <div class="leaderboard-list" id="leaderboard-list"></div>
    </div>

    <div id="profile-screen" class="screen">
        <div class="profile-header">
            <div class="avatar" id="profile-avatar">👤</div>
            <h2 id="profile-name">Player</h2>
            <p id="profile-email">player@email.com</p>
        </div>
        
        <div class="profile-stats">
            <div class="profile-stat">
                <div class="value" id="profile-wallet">0</div>
                <div class="label">WALLET</div>
            </div>
            <div class="profile-stat">
                <div class="value" id="profile-highscore">0</div>
                <div class="label">BEST</div>
            </div>
            <div class="profile-stat">
                <div class="value" id="profile-games">0</div>
                <div class="label">GAMES</div>
            </div>
        </div>
        
        <button class="btn btn-primary" onclick="Game.start()">▶ PLAY GAME</button>
        <button class="btn btn-text" onclick="Auth.logout()" style="color: #ff4444;">LOGOUT</button>
    </div>

    <div id="game-over-overlay" class="overlay">
        <div class="overlay-content">
            <h2 style="color: #ff4444; text-shadow: 0 0 20px #ff4444;">GAME OVER</h2>
            <p style="font-size: 20px; color: #ccc; margin: 20px 0;">Score: <span id="final-score" style="color: #ffd700; font-size: 32px; font-weight: bold;">0</span></p>
            <button class="btn btn-primary" id="revive-btn" onclick="Game.revive()">▶ WATCH AD (+₹10)</button>
            <button class="btn btn-text" onclick="Game.home()">🏠 HOME</button>
        </div>
    </div>

    <div id="bottom-nav">
        <div class="nav-item active" onclick="UI.showScreen('home-screen', this)">
            <div class="icon">🏠</div>
            <div class="label">HOME</div>
        </div>
        <div class="nav-item" onclick="Game.start()">
            <div class="icon">🎮</div>
            <div class="label">PLAY</div>
        </div>
        <div class="nav-item" onclick="UI.showScreen('leaderboard-screen', this)">
            <div class="icon">🏆</div>
            <div class="label">RANKS</div>
        </div>
        <div class="nav-item" onclick="UI.showScreen('profile-screen', this)">
            <div class="icon">👤</div>
            <div class="label">PROFILE</div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA0hPHVr7djeUc2tQgIuT78eUn3cJx3tdw",
    authDomain: "coin-catcher-ultimate.firebaseapp.com",
    databaseURL: "https://coin-catcher-ultimate-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "coin-catcher-ultimate",
    storageBucket: "coin-catcher-ultimate.firebasestorage.app",
    messagingSenderId: "348268654251",
    appId: "1:348268654251:web:ace2d47b968ba2156111ee"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const Auth = {
    user: null,
    isRegisterMode: false,
    
    init() {
        auth.onAuthStateChanged(async user => {
            if (user) {
                this.user = user;
                await this.loadUserData();
                setTimeout(() => UI.showScreen('home-screen'), 2000);
            } else {
                setTimeout(() => UI.showScreen('auth-screen'), 2000);
            }
        });
    },
    
    async submit() {
        const email = document.getElementById('email-input').value;
        const password = document.getElementById('password-input').value;
        const btn = document.getElementById('auth-btn');
        
        if (!email || !password) {
            UI.showToast('Please fill all fields', 'red');
            return;
        }
        
        btn.disabled = true;
        btn.innerText = 'Please wait...';
        
        try {
            if (this.isRegisterMode) {
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('users').doc(cred.user.uid).set({
                    email: email,
                    wallet: 0,
                    highScore: 0,
                    gamesPlayed: 0,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                UI.showToast('Account created!', 'gold');
            } else {
                await auth.signInWithEmailAndPassword(email, password);
                UI.showToast('Welcome back!', 'gold');
            }
        } catch (error) {
            console.error('Auth error:', error);
            UI.showToast(error.message, 'red');
        } finally {
            btn.disabled = false;
            btn.innerText = this.isRegisterMode ? 'REGISTER' : 'LOGIN';
        }
    },
    
    async google() {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            const result = await auth.signInWithPopup(provider);
            const userDoc = await db.collection('users').doc(result.user.uid).get();
            
            if (!userDoc.exists) {
                await db.collection('users').doc(result.user.uid).set({
                    email: result.user.email,
                    wallet: 0,
                    highScore: 0,
                    gamesPlayed: 0,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            UI.showToast('Welcome!', 'gold');
        } catch (error) {
            console.error('Google auth error:', error);
            UI.showToast(error.message, 'red');
        }
    },
    
    toggleMode() {
        this.isRegisterMode = !this.isRegisterMode;
        document.getElementById('auth-title').innerText = this.isRegisterMode ? 'REGISTER' : 'LOGIN';
        document.getElementById('auth-btn').innerText = this.isRegisterMode ? 'REGISTER' : 'LOGIN';
        document.getElementById('toggle-auth-btn').innerText = this.isRegisterMode ? 
            'Already have an account? Login' : 'Don\'t have an account? Register';
    },
    
    async loadUserData() {
        try {
            const doc = await db.collection('users').doc(this.user.uid).get();
            if (doc.exists) {
                Storage.data = doc.data();
                UI.updateDisplays();
            } else {
                await db.collection('users').doc(this.user.uid).set({
                    email: this.user.email,
                    wallet: 0,
                    highScore: 0,
                    gamesPlayed: 0,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                Storage.data = { wallet: 0, highScore: 0, gamesPlayed: 0 };
            }
        } catch (error) {
            console.error('Load user data error:', error);
        }
    },
    
    async saveUserData() {
        try {
            await db.collection('users').doc(this.user.uid).set({
                wallet: Storage.data.wallet,
                highScore: Storage.data.highScore,
                gamesPlayed: Storage.data.gamesPlayed
            }, { merge: true });
        } catch (error) {
            console.error('Save user data error:', error);
        }
    },
    
    logout() {
        auth.signOut();
        UI.showScreen('auth-screen');
    }
};

const Storage = {
    data: {
        wallet: 0.00,
        highScore: 0,
        gamesPlayed: 0
    },
    
    async save() {
        if (Auth.user) {
            await Auth.saveUserData();
        }
    }
};

const UI = {
    showScreen(id, navElement = null) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        if (navElement) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            navElement.classList.add('active');
        }
        
        this.updateDisplays();
        
        if (id === 'leaderboard-screen') {
            Leaderboard.load();
        }
    },
    
    updateDisplays() {
        document.getElementById('home-wallet').innerText = Storage.data.wallet.toFixed(2);
        document.getElementById('home-highscore').innerText = Storage.data.highScore;
        document.getElementById('home-games').innerText = Storage.data.gamesPlayed;
        
        document.getElementById('profile-wallet').innerText = Storage.data.wallet.toFixed(2);
        document.getElementById('profile-highscore').innerText = Storage.data.highScore;
        document.getElementById('profile-games').innerText = Storage.data.gamesPlayed;
        
        if (Auth.user) {
            document.getElementById('profile-name').innerText = Auth.user.displayName || 'Player';
            document.getElementById('profile-email').innerText = Auth.user.email;
        }
    },
    
    showToast(msg, type = '') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
};

const Leaderboard = {
    async load() {
        try {
            const snapshot = await db.collection('users')
                .orderBy('highScore', 'desc')
                .limit(50)
                .get();
            
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = '';
            
            if (snapshot.empty) {
                list.innerHTML = '<p style="text-align: center; color: #888;">No players yet. Be the first!</p>';
                return;
            }
            
            let rank = 1;
            snapshot.forEach(doc => {
                const data = doc.data();
                const item = document.createElement('div');
                item.className = `leaderboard-item ${rank <= 3 ? 'top-3' : ''}`;
                item.innerHTML = `
                    <div class="rank">#${rank}</div>
                    <div class="player-info">
                        <div class="player-name">${data.email.split('@')[0]}</div>
                        <div class="player-level">Level ${Math.floor(data.highScore / 500) + 1}</div>
                    </div>
                    <div class="player-score">${data.highScore}</div>
                `;
                list.appendChild(item);
                rank++;
            });
        } catch (error) {
            console.error('Leaderboard error:', error);
            UI.showToast('Failed to load leaderboard', 'red');
        }
    }
};

const Game = {
    canvas: null,
    ctx: null,
    animationId: null,
    isRunning: false,
    
    score: 0,
    lives: 3,
    level: 1,
    itemSpeed: 4,
    comboMultiplier: 1,
    comboTimer: 0,
    
    shakeTime: 0,
    shakeMagnitude: 0,
    flashTimer: 0,
    levelUpTimer: 0,
    
    player: { x: 0, y: 0, width: 50, height: 15, speed: 7 },
    items: [],
    particles: [],
    stars: [],
    
    keys: {},
    touchX: null,
    
    init() {
        this.canvas = document.getElementById('game-canvas');
        this.ctx = this.canvas.getContext('2d');
        
        for(let i = 0; i < 80; i++) {
            this.stars.push({
                x: Math.random() * 400,
                y: Math.random() * 600,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 2 + 0.5
            });
        }
        
        document.addEventListener('keydown', e => this.keys[e.key] = true);
        document.addEventListener('keyup', e => this.keys[e.key] = false);
        
        this.canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = this.canvas.getBoundingClientRect();
            this.touchX = (touch.clientX - rect.left) * (this.canvas.width / rect.width);
        });
        
        this.canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = this.canvas.getBoundingClientRect();
            this.touchX = (touch.clientX - rect.left) * (this.canvas.width / rect.width);
        });
        
        this.canvas.addEventListener('touchend', () => this.touchX = null);
    },
    
    resizeCanvas() {
        const container = document.getElementById('app');
        const hud = document.getElementById('game-hud');
        
        this.canvas.width = container.clientWidth;
        this.canvas.height = container.clientHeight - hud.offsetHeight;
        
        this.player.x = this.canvas.width / 2 - this.player.width / 2;
        this.player.y = this.canvas.height - 50;
        
        this.stars.forEach(s => {
            s.x = Math.random() * this.canvas.width;
            s.y = Math.random() * this.canvas.height;
        });
    },
    
    start() {
        Audio.init();
        
        this.score = 0;
        this.lives = 3;
        this.level = 1;
        this.itemSpeed = 4;
        this.comboMultiplier = 1;
        this.comboTimer = 0;
        this.items = [];
        this.particles = [];
        
        UI.showScreen('game-screen');
        
        setTimeout(() => {
            this.resizeCanvas();
            this.updateHUD();
            
            this.isRunning = true;
            if (this.animationId) cancelAnimationFrame(this.animationId);
            this.loop();
        }, 100);
    },
    
    loop() {
        if (!this.isRunning) return;
        this.update();
        this.draw();
        this.animationId = requestAnimationFrame(() => this.loop());
    },
    
    update() {
        if (this.keys['ArrowLeft'] && this.player.x > 0) this.player.x -= this.player.speed;
        if (this.keys['ArrowRight'] && this.player.x < this.canvas.width - this.player.width) this.player.x += this.player.speed;
        
        if (this.touchX !== null) this.player.x = this.touchX - this.player.width / 2;
        this.player.x = Math.max(0, Math.min(this.canvas.width - this.player.width, this.player.x));
        
        this.stars.forEach(s => {
            s.y += s.speed + (this.itemSpeed * 0.2);
            if (s.y > this.canvas.height) { s.y = 0; s.x = Math.random() * this.canvas.width; }
        });
        
        if (this.comboTimer > 0) { this.comboTimer--; if (this.comboTimer === 0) this.comboMultiplier = 1; }
        if (this.levelUpTimer > 0) this.levelUpTimer--;
        if (this.shakeTime > 0) this.shakeTime--;
        if (this.flashTimer > 0) this.flashTimer--;
        
        const newLevel = Math.floor(this.score / 500) + 1;
        if (newLevel > this.level) {
            this.level = newLevel;
            this.levelUpTimer = 120;
            this.itemSpeed += 1;
            document.getElementById('level-display').innerText = `LVL ${this.level}`;
            Audio.vibrate([50, 50, 50, 50, 200]);
            UI.showToast(`LEVEL ${this.level} REACHED!`, 'gold');
        }
        
        if (Math.random() < 0.03 + (this.level * 0.005)) {
            const isBomb = Math.random() > 0.75;
            this.items.push({ x: Math.random() * (this.canvas.width - 20), y: -20, width: 20, height: 20, isBomb, pulse: 0 });
        }
        
        for (let i = this.items.length - 1; i >= 0; i--) {
            const item = this.items[i];
            item.y += this.itemSpeed;
            item.pulse += 0.1;
            
            if (item.y + item.height >= this.player.y &&
                item.x + item.width >= this.player.x &&
                item.x <= this.player.x + this.player.width) {
                
                if (item.isBomb) {
                    this.lives--;
                    this.createParticles(item.x + 10, item.y + 10, '#ff0000', 25);
                    this.shakeMagnitude = 15; this.shakeTime = 20; this.flashTimer = 15;
                    Audio.play(100, 'sawtooth', 0.4);
                    Audio.vibrate([100, 50, 100]);
                    
                    if (this.lives <= 0) { this.gameOver(); return; }
                } else {
                    const points = 10 * this.comboMultiplier;
                    this.score += points;
                    Storage.data.wallet += (0.10 * this.comboMultiplier);
                    
                    this.createParticles(item.x + 10, item.y + 10, '#ffd700', 15);
                    Audio.play(600 + this.comboMultiplier * 100, 'sine', 0.1);
                    Audio.vibrate(15);
                    
                    this.comboTimer = 60;
                    if (this.comboMultiplier < 5) this.comboMultiplier++;
                }
                this.items.splice(i, 1);
            } else if (item.y > this.canvas.height) {
                if (!item.isBomb) {
                    this.lives--; this.comboMultiplier = 1;
                    Audio.play(150, 'square', 0.2);
                    if (this.lives <= 0) { this.gameOver(); return; }
                }
                this.items.splice(i, 1);
            }
        }
        
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.03;
            if (p.life <= 0) this.particles.splice(i, 1);
        }
        
        this.updateHUD();
    },
    
    draw() {
        const ctx = this.ctx;
        ctx.save();
        
        if (this.shakeTime > 0) {
            ctx.translate((Math.random() - 0.5) * this.shakeMagnitude, (Math.random() - 0.5) * this.shakeMagnitude);
        }
        
        const bgGrad = ctx.createLinearGradient(0, 0, 0, this.canvas.height);
        if (this.level === 1) { bgGrad.addColorStop(0, '#0a0a1a'); bgGrad.addColorStop(1, '#1a1a2e'); }
        else if (this.level === 2) { bgGrad.addColorStop(0, '#1a0a2e'); bgGrad.addColorStop(1, '#2e1a3e'); }
        else { bgGrad.addColorStop(0, '#2e0a0a'); bgGrad.addColorStop(1, '#3e1a1a'); }
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        ctx.fillStyle = 'white';
        this.stars.forEach(s => {
            ctx.globalAlpha = s.size / 2.5;
            ctx.fillRect(s.x, s.y, s.size, s.size);
        });
        ctx.globalAlpha = 1.0;
        
        ctx.save();
        ctx.translate(this.player.x + this.player.width / 2, this.player.y + this.player.height / 2);
        
        const trailGrad = ctx.createLinearGradient(0, 0, 0, 30);
        trailGrad.addColorStop(0, 'rgba(0, 255, 204, 0.8)');
        trailGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = trailGrad;
        ctx.fillRect(-this.player.width / 2, 0, this.player.width, 30);
        
        ctx.shadowBlur = 20; ctx.shadowColor = '#00ffcc';
        ctx.fillStyle = '#00ffcc';
        ctx.beginPath();
        ctx.ellipse(0, 0, this.player.width / 2, this.player.height / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        ctx.fillStyle = '#0a0a1a';
        ctx.beginPath();
        ctx.ellipse(0, -2, 10, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        
        this.items.forEach(item => {
            ctx.save();
            ctx.translate(item.x + 10, item.y + 10);
            
            if (item.isBomb) {
                ctx.rotate(-item.pulse * 0.5);
                ctx.shadowBlur = 15; ctx.shadowColor = '#ff0000';
                ctx.fillStyle = '#4a0000';
                for (let i = 0; i < 8; i++) {
                    ctx.save();
                    ctx.rotate((Math.PI * 2 / 8) * i);
                    ctx.fillRect(-3, -15, 6, 10);
                    ctx.restore();
                }
                const bombGrad = ctx.createRadialGradient(0, 0, 2, 0, 0, 10);
                bombGrad.addColorStop(0, '#ff4444'); bombGrad.addColorStop(1, '#8b0000');
                ctx.fillStyle = bombGrad;
                ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + Math.sin(item.pulse * 2) * 0.5})`;
                ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
            } else {
                ctx.rotate(item.pulse);
                const coinGrad = ctx.createRadialGradient(0, 0, 2, 0, 0, 12);
                coinGrad.addColorStop(0, '#fff59d'); coinGrad.addColorStop(0.5, '#ffd700'); coinGrad.addColorStop(1, '#b8860b');
                ctx.fillStyle = coinGrad;
                ctx.shadowBlur = 15; ctx.shadowColor = '#ffd700';
                ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#b8860b'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('₹', 0, 1);
            }
            ctx.restore();
        });
        
        this.particles.forEach(p => {
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        });
        ctx.globalAlpha = 1.0;
        
        if (this.flashTimer > 0) {
            ctx.fillStyle = `rgba(255, 0, 0, ${this.flashTimer / 30})`;
            ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        }
        
        if (this.levelUpTimer > 0) {
            ctx.globalAlpha = this.levelUpTimer / 120;
            ctx.fillStyle = '#ff00ff';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.shadowBlur = 30; ctx.shadowColor = '#ff00ff';
            ctx.fillText(`LEVEL ${this.level}`, this.canvas.width / 2, this.canvas.height / 2);
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1.0;
        }
        
        ctx.restore();
    },
    
    createParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
            this.particles.push({ x, y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8, life: 1.0, color, size: Math.random() * 4 + 2 });
        }
    },
    
    updateHUD() {
        document.getElementById('score').innerText = this.score;
        document.getElementById('lives').innerText = this.lives;
    },
    
    async gameOver() {
        this.isRunning = false;
        if (this.animationId) {
            cancelAnimationFrame(this.animationId);
            this.animationId = null;
        }
        
        Storage.data.gamesPlayed++;
        if (this.score > Storage.data.highScore) {
            Storage.data.highScore = this.score;
        }
        await Storage.save();
        
        document.getElementById('final-score').innerText = this.score;
        document.getElementById('game-over-overlay').classList.add('active');
    },
    
    async revive() {
        const btn = document.getElementById('revive-btn');
        let timer = 5;
        btn.innerText = `Watching Ad... ${timer}s`;
        btn.style.background = '#555';
        btn.disabled = true;
        
        const interval = setInterval(async () => {
            timer--;
            if (timer > 0) {
                btn.innerText = `Watching Ad... ${timer}s`;
            } else {
                clearInterval(interval);
                
                Storage.data.wallet += 10.00;
                await Storage.save();
                
                this.lives = 1;
                this.items = [];
                this.itemSpeed = 4;
                
                document.getElementById('game-over-overlay').classList.remove('active');
                btn.innerText = '▶ WATCH AD (+₹10)';
                btn.style.background = '';
                btn.disabled = false;
                
                UI.showToast('Revived! +₹10 Added', 'gold');
                this.updateHUD();
                
                this.isRunning = true;
                this.loop();
            }
        }, 1000);
    },
    
    home() {
        this.isRunning = false;
        if (this.animationId) {
            cancelAnimationFrame(this.animationId);
            this.animationId = null;
        }
        
        document.getElementById('game-over-overlay').classList.remove('active');
        UI.showScreen('home-screen');
    }
};

const Audio = {
    ctx: null,
    
    init() {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    },
    
    play(freq, type, duration) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type; osc.frequency.value = freq;
        gain.gain.value = 0.1;
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
        osc.connect(gain); gain.connect(this.ctx.destination);
        osc.start(); osc.stop(this.ctx.currentTime + duration);
    },
    
    vibrate(pattern) {
        if (navigator.vibrate) navigator.vibrate(pattern);
    }
};

Auth.init();
Game.init();
</script>
