<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Catcher</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: Arial, sans-serif; color: white; }
        
        .screen { display: none; padding: 20px; min-height: 100vh; }
        .screen.active { display: block; }
        
        h1 { color: #00ffcc; margin-bottom: 20px; }
        h2 { color: #ffd700; margin-bottom: 15px; }
        
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }
        
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #00ffcc;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        button:active { opacity: 0.7; }
        
        .btn-secondary {
            background: #333;
            color: #fff;
        }
        
        .wallet {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin: 20px 0;
        }
        
        .wallet .amount { font-size: 48px; font-weight: bold; }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-box {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-box .value { font-size: 32px; color: #00ffcc; font-weight: bold; }
        .stat-box .label { color: #888; font-size: 14px; }
        
        #game-canvas {
            width: 100%;
            height: 500px;
            background: #0a0a1a;
            border: 2px solid #00ffcc;
            border-radius: 10px;
            touch-action: none;
        }
        
        .hud {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: #1a1a2e;
            border-radius: 8px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .overlay.active { display: flex; }
        
        .overlay-content {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #00ffcc;
        }
        
        .nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #0a0a1a;
            display: flex;
            padding: 10px 0;
            border-top: 1px solid #333;
        }
        
        .nav-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #666;
        }
        
        .nav-item.active { color: #00ffcc; }
    </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="screen active">
    <h1>COIN CATCHER</h1>
    <h2 id="auth-title">LOGIN</h2>
    
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    
    <button id="auth-btn" onclick="Auth.submit()">LOGIN</button>
    <button class="btn-secondary" onclick="Auth.toggle()">Don't have account? Register</button>
</div>

<!-- HOME SCREEN -->
<div id="home-screen" class="screen">
    <h1>HOME</h1>
    
    <div class="wallet">
        <div style="font-size: 14px;">WALLET BALANCE</div>
        <div class="amount">₹<span id="home-wallet">0.00</span></div>
    </div>
    
    <div class="stats">
        <div class="stat-box">
            <div class="value" id="home-highscore">0</div>
            <div class="label">HIGH SCORE</div>
        </div>
        <div class="stat-box">
            <div class="value" id="home-games">0</div>
            <div class="label">GAMES</div>
        </div>
    </div>
    
    <button onclick="Game.start()">▶ PLAY NOW</button>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
    <div class="hud">
        <div>SCORE: <span id="score">0</span></div>
        <div>LIVES: <span id="lives">3</span></div>
    </div>
    <canvas id="game-canvas"></canvas>
</div>

<!-- GAME OVER -->
<div id="game-over" class="overlay">
    <div class="overlay-content">
        <h2 style="color: #ff4444;">GAME OVER</h2>
        <p style="font-size: 24px; margin: 20px 0;">Score: <span id="final-score">0</span></p>
        <button onclick="Game.home()">🏠 HOME</button>
    </div>
</div>

<!-- NAVIGATION -->
<div class="nav">
    <div class="nav-item active" onclick="UI.show('home-screen')">🏠 Home</div>
    <div class="nav-item" onclick="Game.start()">🎮 Play</div>
    <div class="nav-item" onclick="alert('Coming soon!')">🏆 Ranks</div>
    <div class="nav-item" onclick="Auth.logout()">👤 Profile</div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyA0hPHVr7djeUc2tQgIuT78eUn3cJx3tdw",
    authDomain: "coin-catcher-ultimate.firebaseapp.com",
    projectId: "coin-catcher-ultimate",
    storageBucket: "coin-catcher-ultimate.firebasestorage.app",
    messagingSenderId: "348268654251",
    appId: "1:348268654251:web:ace2d47b968ba2156111ee"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// Auth Manager
const Auth = {
    user: null,
    isRegister: false,
    
    init() {
        auth.onAuthStateChanged(user => {
            if (user) {
                this.user = user;
                this.loadData();
                UI.show('home-screen');
            } else {
                UI.show('auth-screen');
            }
        });
    },
    
    async submit() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (!email || !password) {
            alert('Please fill all fields');
            return;
        }
        
        try {
            if (this.isRegister) {
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('users').doc(cred.user.uid).set({
                    email, wallet: 0, highScore: 0, gamesPlayed: 0
                });
                alert('Account created!');
            } else {
                await auth.signInWithEmailAndPassword(email, password);
                alert('Welcome back!');
            }
        } catch (err) {
            alert(err.message);
        }
    },
    
    toggle() {
        this.isRegister = !this.isRegister;
        document.getElementById('auth-title').innerText = this.isRegister ? 'REGISTER' : 'LOGIN';
        document.getElementById('auth-btn').innerText = this.isRegister ? 'REGISTER' : 'LOGIN';
    },
    
    async loadData() {
        const doc = await db.collection('users').doc(this.user.uid).get();
        if (doc.exists) {
            Storage.data = doc.data();
            UI.update();
        }
    },
    
    async saveData() {
        await db.collection('users').doc(this.user.uid).set(Storage.data, { merge: true });
    },
    
    logout() {
        auth.signOut();
    }
};

// Storage
const Storage = {
    data: { wallet: 0, highScore: 0, gamesPlayed: 0 },
    
    async save() {
        if (Auth.user) await Auth.saveData();
    }
};

// UI Manager
const UI = {
    show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        this.update();
    },
    
    update() {
        document.getElementById('home-wallet').innerText = Storage.data.wallet.toFixed(2);
        document.getElementById('home-highscore').innerText = Storage.data.highScore;
        document.getElementById('home-games').innerText = Storage.data.gamesPlayed;
    }
};

// Game Engine
const Game = {
    canvas: null,
    ctx: null,
    running: false,
    score: 0,
    lives: 3,
    player: { x: 0, y: 0, width: 50, height: 15 },
    items: [],
    
    init() {
        this.canvas = document.getElementById('game-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        
        this.canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const rect = this.canvas.getBoundingClientRect();
            this.player.x = (e.touches[0].clientX - rect.left) * (this.canvas.width / rect.width) - this.player.width / 2;
        });
    },
    
    resize() {
        this.canvas.width = this.canvas.clientWidth;
        this.canvas.height = 500;
        this.player.x = this.canvas.width / 2 - this.player.width / 2;
        this.player.y = this.canvas.height - 50;
    },
    
    start() {
        this.score = 0;
        this.lives = 3;
        this.items = [];
        this.running = true;
        UI.show('game-screen');
        this.resize();
        this.loop();
    },
    
    loop() {
        if (!this.running) return;
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    },
    
    update() {
        if (Math.random() < 0.03) {
            this.items.push({
                x: Math.random() * (this.canvas.width - 20),
                y: -20,
                isBomb: Math.random() > 0.75
            });
        }
        
        for (let i = this.items.length - 1; i >= 0; i--) {
            const item = this.items[i];
            item.y += 4;
            
            if (item.y > this.player.y && item.x > this.player.x && item.x < this.player.x + this.player.width) {
                if (item.isBomb) {
                    this.lives--;
                    if (this.lives <= 0) this.gameOver();
                } else {
                    this.score += 10;
                    Storage.data.wallet += 0.10;
                }
                this.items.splice(i, 1);
            } else if (item.y > this.canvas.height) {
                this.items.splice(i, 1);
            }
        }
        
        document.getElementById('score').innerText = this.score;
        document.getElementById('lives').innerText = this.lives;
    },
    
    draw() {
        this.ctx.fillStyle = '#0a0a1a';
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        this.ctx.fillStyle = '#00ffcc';
        this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);
        
        this.items.forEach(item => {
            this.ctx.fillStyle = item.isBomb ? '#ff4444' : '#ffd700';
            this.ctx.beginPath();
            this.ctx.arc(item.x + 10, item.y + 10, 10, 0, Math.PI * 2);
            this.ctx.fill();
        });
    },
    
    async gameOver() {
        this.running = false;
        Storage.data.gamesPlayed++;
        if (this.score > Storage.data.highScore) Storage.data.highScore = this.score;
        await Storage.save();
        
        document.getElementById('final-score').innerText = this.score;
        document.getElementById('game-over').classList.add('active');
    },
    
    home() {
        document.getElementById('game-over').classList.remove('active');
        UI.show('home-screen');
    }
};

// Initialize
Auth.init();
Game.init();
</script>

</body>
</html>
