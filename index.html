<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Catcher Ultimate - FIXED</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            color: white; 
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a2e 100%);
        }

        .screen { 
            display: none; 
            width: 100%; 
            height: 100%;
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            padding: 20px;
            position: absolute;
            top: 0;
            left: 0;
        }
        .screen.active { display: flex; }

        h1 { 
            font-size: 36px; 
            color: #00ffcc; 
            text-shadow: 0 0 30px #00ffcc, 0 0 60px #00ffcc; 
            margin-bottom: 10px; 
            letter-spacing: 3px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 30px #00ffcc, 0 0 60px #00ffcc; }
            50% { text-shadow: 0 0 40px #00ffcc, 0 0 80px #00ffcc; }
        }

        h2 { 
            font-size: 28px; 
            color: #ffd700; 
            text-shadow: 0 0 20px #ffd700; 
            margin-bottom: 20px;
        }

        .wallet-box {
            background: rgba(0, 255, 204, 0.1);
            border: 2px solid #00ffcc;
            border-radius: 30px;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: #00ffcc;
            margin: 20px 0;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3);
        }

        .stats {
            color: #888;
            font-size: 16px;
            margin: 10px 0;
        }

        .stats span { color: #ffd700; font-weight: bold; }

        .btn {
            width: 80%;
            max-width: 300px;
            padding: 18px;
            margin: 10px 0;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active { transform: scale(0.95); }

        .btn-primary { 
            background: linear-gradient(135deg, #00ffcc 0%, #00b399 100%); 
            color: #000;
            box-shadow: 0 4px 20px rgba(0, 255, 204, 0.4);
        }

        .btn-gold { 
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%); 
            color: #000;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }

        .btn-secondary { 
            background: rgba(255, 255, 255, 0.1); 
            color: #aaa;
            border: 1px solid #444;
        }

        .shop-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            margin: 10px 0;
            width: 100%;
            max-width: 350px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .shop-item:active { transform: scale(0.98); }

        .shop-info { text-align: left; flex: 1; }
        .shop-title { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .shop-desc { font-size: 14px; color: #888; }

        #game-screen { padding: 0; }

        #game-hud {
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        #game-canvas {
            width: 100%;
            flex: 1;
            display: block;
            touch-action: none;
            background: #0a0a1a;
        }

        .overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .overlay.active { display: flex; }

        .overlay-content {
            background: rgba(10, 10, 30, 0.95);
            border: 2px solid #00ffcc;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.5);
            max-width: 350px;
        }

        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: rgba(0, 0, 0, 0.95);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            border: 2px solid #00ffcc;
            animation: slideIn 0.3s ease, fadeOut 0.5s ease 2.5s forwards;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .toast.gold { border-color: #ffd700; color: #ffd700; }
        .toast.red { border-color: #ff4444; color: #ff4444; }

        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-30px); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="toast-container"></div>

    <!-- START SCREEN -->
    <div id="start-screen" class="screen active">
        <h1>COIN CATCHER</h1>
        <p style="color: #888; margin-bottom: 30px;">ULTIMATE EDITION</p>
        <div class="wallet-box">₹<span id="menu-wallet">0.00</span></div>
        <div class="stats">HIGH SCORE: <span id="high-score">0</span></div>
        <button class="btn btn-primary" onclick="Game.start()">▶ PLAY</button>
        <button class="btn btn-gold" onclick="UI.showScreen('shop-screen')">🛒 SHOP</button>
    </div>

    <!-- SHOP SCREEN -->
    <div id="shop-screen" class="screen">
        <h2>UPGRADE SHOP</h2>
        <div class="wallet-box">₹<span id="shop-wallet">0.00</span></div>
        
        <div class="shop-item">
            <div class="shop-info">
                <div class="shop-title">🛡️ SHIELD</div>
                <div class="shop-desc">Survive 1 bomb hit</div>
            </div>
            <button class="btn btn-primary" style="width: auto; padding: 12px 24px; margin: 0;" onclick="Shop.buy('shield', 50)">₹50</button>
        </div>

        <div class="shop-item">
            <div class="shop-info">
                <div class="shop-title">🧲 MAGNET</div>
                <div class="shop-desc">Attract coins for 10s</div>
            </div>
            <button class="btn btn-primary" style="width: auto; padding: 12px 24px; margin: 0;" onclick="Shop.buy('magnet', 100)">₹100</button>
        </div>

        <button class="btn btn-secondary" onclick="UI.showScreen('start-screen')" style="margin-top: 30px;">← BACK</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <div id="game-hud">
            <div>SCORE: <span id="score" style="color: #ffd700;">0</span></div>
            <div id="level-display" style="color: #ff00ff;">LVL 1</div>
            <div>LIVES: <span id="lives" style="color: #ff4444;">3</span></div>
        </div>
        <canvas id="game-canvas"></canvas>
    </div>

    <!-- GAME OVER OVERLAY -->
    <div id="game-over-overlay" class="overlay">
        <div class="overlay-content">
            <h2 style="color: #ff4444; text-shadow: 0 0 20px #ff4444;">GAME OVER</h2>
            <p style="font-size: 20px; color: #ccc; margin: 20px 0;">Score: <span id="final-score" style="color: #ffd700; font-size: 32px; font-weight: bold;">0</span></p>
            <button class="btn btn-gold" id="revive-btn" onclick="Game.revive()">▶ WATCH AD (+₹10)</button>
            <button class="btn btn-secondary" onclick="Game.home()">🏠 HOME</button>
        </div>
    </div>
</div>

<script>
// ============================================
// CORE GAME ENGINE - FIXED VERSION
// ============================================

const Game = {
    canvas: null,
    ctx: null,
    animationId: null,
    isRunning: false,
    
    // Game State
    score: 0,
    lives: 3,
    level: 1,
    itemSpeed: 4,
    comboMultiplier: 1,
    comboTimer: 0,
    
    // Effects
    shakeTime: 0,
    shakeMagnitude: 0,
    flashTimer: 0,
    levelUpTimer: 0,
    
    // Power-ups
    hasShield: false,
    hasMagnet: false,
    magnetTimer: 0,
    
    // Game Objects
    player: { x: 0, y: 0, width: 50, height: 15, speed: 7 },
    items: [],
    particles: [],
    stars: [],
    
    // Input
    keys: {},
    touchX: null,
    
    init() {
        this.canvas = document.getElementById('game-canvas');
        this.ctx = this.canvas.getContext('2d');
        
        // Set initial canvas size
        this.canvas.width = 400;
        this.canvas.height = 600;
        
        // Initialize stars
        for(let i = 0; i < 80; i++) {
            this.stars.push({
                x: Math.random() * this.canvas.width,
                y: Math.random() * this.canvas.height,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 2 + 0.5
            });
        }
        
        // Input handlers
        document.addEventListener('keydown', e => this.keys[e.key] = true);
        document.addEventListener('keyup', e => this.keys[e.key] = false);
        
        this.canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = this.canvas.getBoundingClientRect();
            this.touchX = (touch.clientX - rect.left) * (this.canvas.width / rect.width);
        });
        
        this.canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = this.canvas.getBoundingClientRect();
            this.touchX = (touch.clientX - rect.left) * (this.canvas.width / rect.width);
        });
        
        this.canvas.addEventListener('touchend', () => this.touchX = null);
    },
    
    resizeCanvas() {
        const container = document.getElementById('game-container');
        const hud = document.getElementById('game-hud');
        
        // Use window dimensions as fallback
        this.canvas.width = container.clientWidth || window.innerWidth;
        this.canvas.height = (container.clientHeight - hud.offsetHeight) || (window.innerHeight - 60);
        
        this.player.x = this.canvas.width / 2 - this.player.width / 2;
        this.player.y = this.canvas.height - 50;
        
        // Reset stars for new dimensions
        this.stars.forEach(s => {
            s.x = Math.random() * this.canvas.width;
            s.y = Math.random() * this.canvas.height;
        });
    },
    
    start() {
        Audio.init();
        
        this.score = 0;
        this.lives = 3;
        this.level = 1;
        this.itemSpeed = 4;
        this.comboMultiplier = 1;
        this.comboTimer = 0;
        this.items = [];
        this.particles = [];
        
        this.magnetTimer = Storage.data.hasMagnet ? 600 : 0;
        this.hasShield = Storage.data.hasShield;
        this.hasMagnet = Storage.data.hasMagnet;
        
        UI.showScreen('game-screen');
        
        // CRITICAL FIX: Resize canvas AFTER screen is visible
        setTimeout(() => {
            this.resizeCanvas();
            this.updateHUD();
            
            this.isRunning = true;
            if (this.animationId) cancelAnimationFrame(this.animationId);
            this.loop();
        }, 100);
    },
    
    loop() {
        if (!this.isRunning) return;
        
        this.update();
        this.draw();
        this.animationId = requestAnimationFrame(() => this.loop());
    },
    
    update() {
        // Player movement
        if (this.keys['ArrowLeft'] && this.player.x > 0) {
            this.player.x -= this.player.speed;
        }
        if (this.keys['ArrowRight'] && this.player.x < this.canvas.width - this.player.width) {
            this.player.x += this.player.speed;
        }
        
        if (this.touchX !== null) {
            this.player.x = this.touchX - this.player.width / 2;
        }
        
        // Keep player in bounds
        this.player.x = Math.max(0, Math.min(this.canvas.width - this.player.width, this.player.x));
        
        // Update stars
        this.stars.forEach(s => {
            s.y += s.speed + (this.itemSpeed * 0.2);
            if (s.y > this.canvas.height) {
                s.y = 0;
                s.x = Math.random() * this.canvas.width;
            }
        });
        
        // Update timers
        if (this.magnetTimer > 0) this.magnetTimer--;
        if (this.comboTimer > 0) {
            this.comboTimer--;
            if (this.comboTimer === 0) this.comboMultiplier = 1;
        }
        if (this.levelUpTimer > 0) this.levelUpTimer--;
        if (this.shakeTime > 0) this.shakeTime--;
        if (this.flashTimer > 0) this.flashTimer--;
        
        // Level progression
        const newLevel = Math.floor(this.score / 500) + 1;
        if (newLevel > this.level) {
            this.level = newLevel;
            this.levelUpTimer = 120;
            this.itemSpeed += 1;
            document.getElementById('level-display').innerText = `LVL ${this.level}`;
            Audio.vibrate([50, 50, 50, 50, 200]);
            UI.showToast(`LEVEL ${this.level} REACHED!`, 'gold');
        }
        
        // Spawn items
        if (Math.random() < 0.03 + (this.level * 0.005)) {
            const isBomb = Math.random() > 0.75;
            this.items.push({
                x: Math.random() * (this.canvas.width - 20),
                y: -20,
                width: 20,
                height: 20,
                isBomb,
                pulse: 0
            });
        }
        
        // Update items
        for (let i = this.items.length - 1; i >= 0; i--) {
            const item = this.items[i];
            item.y += this.itemSpeed;
            item.pulse += 0.1;
            
            // Magnet effect
            if (!item.isBomb && this.magnetTimer > 0) {
                const dx = (this.player.x + this.player.width / 2) - (item.x + 10);
                const dy = this.player.y - (item.y + 10);
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    item.x += (dx / dist) * 5;
                    item.y += (dy / dist) * 5;
                }
            }
            
            // Collision detection
            if (item.y + item.height >= this.player.y &&
                item.x + item.width >= this.player.x &&
                item.x <= this.player.x + this.player.width) {
                
                if (item.isBomb) {
                    if (this.hasShield) {
                        this.hasShield = false;
                        Storage.data.hasShield = false;
                        Storage.save();
                        this.createParticles(item.x + 10, item.y + 10, '#00ffcc', 20);
                        Audio.play(400, 'triangle', 0.2);
                        Audio.vibrate(30);
                    } else {
                        this.lives--;
                        this.createParticles(item.x + 10, item.y + 10, '#ff0000', 25);
                        this.shakeMagnitude = 15;
                        this.shakeTime = 20;
                        this.flashTimer = 15;
                        Audio.play(100, 'sawtooth', 0.4);
                        Audio.vibrate([100, 50, 100]);
                        
                        if (this.lives <= 0) {
                            this.gameOver();
                            return;
                        }
                    }
                } else {
                    const points = 10 * this.comboMultiplier;
                    this.score += points;
                    Storage.data.wallet += (0.10 * this.comboMultiplier);
                    Storage.save();
                    
                    this.createParticles(item.x + 10, item.y + 10, '#ffd700', 15);
                    Audio.play(600 + this.comboMultiplier * 100, 'sine', 0.1);
                    Audio.vibrate(15);
                    
                    this.comboTimer = 60;
                    if (this.comboMultiplier < 5) this.comboMultiplier++;
                }
                
                this.items.splice(i, 1);
            } else if (item.y > this.canvas.height) {
                if (!item.isBomb) {
                    this.lives--;
                    this.comboMultiplier = 1;
                    Audio.play(150, 'square', 0.2);
                    
                    if (this.lives <= 0) {
                        this.gameOver();
                        return;
                    }
                }
                this.items.splice(i, 1);
            }
        }
        
        // Update particles
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.2;
            p.life -= 0.03;
            if (p.life <= 0) this.particles.splice(i, 1);
        }
        
        this.updateHUD();
    },
    
    draw() {
        const ctx = this.ctx;
        
        ctx.save();
        
        // Screen shake
        if (this.shakeTime > 0) {
            const shakeX = (Math.random() - 0.5) * this.shakeMagnitude;
            const shakeY = (Math.random() - 0.5) * this.shakeMagnitude;
            ctx.translate(shakeX, shakeY);
        }
        
        // Dynamic background
        const bgGrad = ctx.createLinearGradient(0, 0, 0, this.canvas.height);
        if (this.level === 1) {
            bgGrad.addColorStop(0, '#0a0a1a');
            bgGrad.addColorStop(1, '#1a1a2e');
        } else if (this.level === 2) {
            bgGrad.addColorStop(0, '#1a0a2e');
            bgGrad.addColorStop(1, '#2e1a3e');
        } else {
            bgGrad.addColorStop(0, '#2e0a0a');
            bgGrad.addColorStop(1, '#3e1a1a');
        }
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        // Draw stars
        ctx.fillStyle = 'white';
        this.stars.forEach(s => {
            ctx.globalAlpha = s.size / 2.5;
            ctx.fillRect(s.x, s.y, s.size, s.size);
        });
        ctx.globalAlpha = 1.0;
        
        // Draw player
        ctx.save();
        ctx.translate(this.player.x + this.player.width / 2, this.player.y + this.player.height / 2);
        
        // Engine trail
        const trailGrad = ctx.createLinearGradient(0, 0, 0, 30);
        const trailColor = this.hasShield ? 'rgba(255, 215, 0, 0.8)' : 'rgba(0, 255, 204, 0.8)';
        trailGrad.addColorStop(0, trailColor);
        trailGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = trailGrad;
        ctx.fillRect(-this.player.width / 2, 0, this.player.width, 30);
        
        // Player body
        ctx.shadowBlur = 20;
        ctx.shadowColor = this.hasShield ? '#ffd700' : '#00ffcc';
        ctx.fillStyle = this.hasShield ? '#ffd700' : '#00ffcc';
        ctx.beginPath();
        ctx.ellipse(0, 0, this.player.width / 2, this.player.height / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // Player detail
        ctx.fillStyle = '#0a0a1a';
        ctx.beginPath();
        ctx.ellipse(0, -2, 10, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
        
        // Draw items
        this.items.forEach(item => {
            ctx.save();
            ctx.translate(item.x + 10, item.y + 10);
            
            if (item.isBomb) {
                ctx.rotate(-item.pulse * 0.5);
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff0000';
                
                // Spikes
                ctx.fillStyle = '#4a0000';
                for (let i = 0; i < 8; i++) {
                    ctx.save();
                    ctx.rotate((Math.PI * 2 / 8) * i);
                    ctx.fillRect(-3, -15, 6, 10);
                    ctx.restore();
                }
                
                // Bomb body
                const bombGrad = ctx.createRadialGradient(0, 0, 2, 0, 0, 10);
                bombGrad.addColorStop(0, '#ff4444');
                bombGrad.addColorStop(1, '#8b0000');
                ctx.fillStyle = bombGrad;
                ctx.beginPath();
                ctx.arc(0, 0, 10, 0, Math.PI * 2);
                ctx.fill();
                
                // Pulsing core
                ctx.fillStyle = `rgba(255, 255, 255, ${0.5 + Math.sin(item.pulse * 2) * 0.5})`;
                ctx.beginPath();
                ctx.arc(0, 0, 4, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.rotate(item.pulse);
                
                // Coin
                const coinGrad = ctx.createRadialGradient(0, 0, 2, 0, 0, 12);
                coinGrad.addColorStop(0, '#fff59d');
                coinGrad.addColorStop(0.5, '#ffd700');
                coinGrad.addColorStop(1, '#b8860b');
                ctx.fillStyle = coinGrad;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ffd700';
                ctx.beginPath();
                ctx.arc(0, 0, 12, 0, Math.PI * 2);
                ctx.fill();
                
                // Inner ring
                ctx.strokeStyle = '#b8860b';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 8, 0, Math.PI * 2);
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                // Rupee symbol
                ctx.fillStyle = '#b8860b';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('₹', 0, 1);
            }
            
            ctx.restore();
        });
        
        // Draw particles
        this.particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size, p.size);
        });
        ctx.globalAlpha = 1.0;
        
        // Screen flash
        if (this.flashTimer > 0) {
            ctx.fillStyle = `rgba(255, 0, 0, ${this.flashTimer / 30})`;
            ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        }
        
        // Level up text
        if (this.levelUpTimer > 0) {
            ctx.globalAlpha = this.levelUpTimer / 120;
            ctx.fillStyle = '#ff00ff';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#ff00ff';
            ctx.fillText(`LEVEL ${this.level}`, this.canvas.width / 2, this.canvas.height / 2);
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1.0;
        }
        
        ctx.restore();
    },
    
    createParticles(x, y, color, count) {
        for (let i = 0; i < count; i++) {
            this.particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.5) * 8,
                life: 1.0,
                color,
                size: Math.random() * 4 + 2
            });
        }
    },
    
    updateHUD() {
        document.getElementById('score').innerText = this.score;
        document.getElementById('lives').innerText = this.lives;
    }
};

// ============================================
// UI MANAGER
// ============================================

const UI = {
    showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        this.updateDisplays();
    },
    
    updateDisplays() {
        document.getElementById('menu-wallet').innerText = Storage.data.wallet.toFixed(2);
        document.getElementById('shop-wallet').innerText = Storage.data.wallet.toFixed(2);
        document.getElementById('high-score').innerText = Storage.data.highScore;
    },
    
    showToast(msg, type = '') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
};

// ============================================
// STORAGE MANAGER
// ============================================

const Storage = {
    data: {
        wallet: 0.00,
        highScore: 0,
        hasShield: false,
        hasMagnet: false
    },
    
    load() {
        const saved = localStorage.getItem('coinCatcherData');
        if (saved) {
            this.data = JSON.parse(saved);
        }
    },
    
    save() {
        localStorage.setItem('coinCatcherData', JSON.stringify(this.data));
    }
};

// ============================================
// SHOP MANAGER
// ============================================

const Shop = {
    buy(type, cost) {
        if (Storage.data.wallet >= cost) {
            Storage.data.wallet -= cost;
            
            if (type === 'shield') Storage.data.hasShield = true;
            if (type === 'magnet') Storage.data.hasMagnet = true;
            
            Storage.save();
            UI.updateDisplays();
            Audio.play(800, 'sine', 0.2);
            Audio.vibrate(50);
            UI.showToast(`Purchased ${type.toUpperCase()}!`, 'gold');
        } else {
            Audio.play(200, 'square', 0.3);
            Audio.vibrate([50, 30, 50]);
            UI.showToast('Not enough balance!', 'red');
        }
    }
};

// ============================================
// AUDIO MANAGER
// ============================================

const Audio = {
    ctx: null,
    
    init() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
    },
    
    play(freq, type, duration) {
        if (!this.ctx) return;
        
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.value = 0.1;
        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
        
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.start();
        osc.stop(this.ctx.currentTime + duration);
    },
    
    vibrate(pattern) {
        if (navigator.vibrate) {
            navigator.vibrate(pattern);
        }
    }
};

// ============================================
// GAME OVER & REVIVE
// ============================================

Game.gameOver = function() {
    this.isRunning = false;
    if (this.animationId) {
        cancelAnimationFrame(this.animationId);
        this.animationId = null;
    }
    
    if (this.score > Storage.data.highScore) {
        Storage.data.highScore = this.score;
        Storage.save();
    }
    
    document.getElementById('final-score').innerText = this.score;
    document.getElementById('game-over-overlay').classList.add('active');
};

Game.revive = function() {
    const btn = document.getElementById('revive-btn');
    let timer = 5;
    btn.innerText = `Watching Ad... ${timer}s`;
    btn.style.background = '#555';
    btn.disabled = true;
    
    const interval = setInterval(() => {
        timer--;
        if (timer > 0) {
            btn.innerText = `Watching Ad... ${timer}s`;
        } else {
            clearInterval(interval);
            
            Storage.data.wallet += 10.00;
            Storage.save();
            
            this.lives = 1;
            this.items = [];
            this.itemSpeed = 4;
            
            document.getElementById('game-over-overlay').classList.remove('active');
            btn.innerText = '▶ WATCH AD (+₹10)';
            btn.style.background = '';
            btn.disabled = false;
            
            UI.showToast('Revived! +₹10 Added', 'gold');
            this.updateHUD();
            
            this.isRunning = true;
            this.loop();
        }
    }, 1000);
};

Game.home = function() {
    this.isRunning = false;
    if (this.animationId) {
        cancelAnimationFrame(this.animationId);
        this.animationId = null;
    }
    
    document.getElementById('game-over-overlay').classList.remove('active');
    UI.showScreen('start-screen');
    UI.updateDisplays();
};

// ============================================
// INITIALIZATION
// ============================================

Storage.load();
Game.init();
UI.updateDisplays();

</script>
