<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Catcher Pro - Swami's Empire</title>
    <style>
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #1a2a3a 0%, #050a10 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            color: white; 
            flex-direction: column;
            overflow: hidden;
            padding: 10px; 
            box-sizing: border-box;
            user-select: none; /* Prevents text highlighting on mobile */
        }
        #ui { 
            margin-bottom: 10px; 
            font-size: clamp(14px, 4vw, 20px); 
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            justify-content: space-between;
        }
        #combo {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
            transition: transform 0.1s;
        }
        canvas { 
            background: #050505; 
            border: 2px solid #00ffcc; 
            border-radius: 15px; 
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.3), inset 0 0 20px rgba(0,0,0,0.8);
            max-width: 100%;
            max-height: 75vh; 
            touch-action: none; 
        }
        #wallet {
            margin-top: 15px;
            background: rgba(0,0,0,0.7);
            padding: 10px 25px;
            border-radius: 25px;
            font-size: clamp(14px, 3.5vw, 18px);
            color: #00ffcc;
            border: 1px solid rgba(0, 255, 204, 0.5);
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2);
            font-weight: bold;
        }
        #ad-overlay {
            display: none; 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 10, 15, 0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.5);
            z-index: 100;
            width: 85%;
            max-width: 320px;
            backdrop-filter: blur(10px);
        }
        #ad-overlay button {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #ad-overlay button:active { transform: scale(0.95); }
        #revive-btn { background: linear-gradient(45deg, #ffd700, #ff8c00); color: black; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4); }
        #restart-btn { background: #222; color: #aaa; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="ui">
        <div>SCORE: <span id="score" style="color: gold;">0</span></div>
        <div id="combo">COMBO: x1</div>
        <div>LIVES: <span id="lives" style="color: #ff4444;">3</span></div>
    </div>
    
    <canvas id="game" width="400" height="600"></canvas>
    
    <div id="wallet">WALLET: ₹<span id="balance">0.00</span></div>

    <div id="ad-overlay">
        <h2 style="color: #ff4444; margin: 0; text-shadow: 0 0 10px red;">CRASHED!</h2>
        <p style="font-size: 18px; margin: 10px 0; color: #ccc;">Final Score: <span id="final-score" style="color: gold; font-weight: bold;">0</span></p>
        <button id="revive-btn">▶ WATCH AD TO REVIVE (+₹10)</button>
        <button id="restart-btn">RESTART</button>
    </div>

    <script>
        // --- SETUP ---
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let score = 0, lives = 3, gameOver = false, itemSpeed = 4;
        let walletBalance = 0.00;
        let isWatchingAd = false, adTimer = 5;
        let comboMultiplier = 1, comboTimer = 0;
        let shakeTime = 0, shakeMagnitude = 0;

        const player = { x: 175, y: 550, width: 50, height: 15, speed: 7 };
        let keys = {};
        let items = [];
        let particles = [];

        // --- CONTROLS ---
        document.addEventListener('keydown', e => keys[e.key] = true);
        document.addEventListener('keyup', e => keys[e.key] = false);

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            player.x = (touch.clientX - rect.left) * (canvas.width / rect.width) - player.width / 2;
        });

        canvas.addEventListener('click', () => { if (gameOver && !isWatchingAd) resetGame(); });
        canvas.addEventListener('touchstart', () => { if (gameOver && !isWatchingAd) resetGame(); });

        // --- PARTICLE SYSTEM (The "Juice") ---
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1.0,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2; // Gravity
                p.life -= 0.03;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1.0;
            });
        }

        // --- GAME LOGIC ---
        function spawnItem() {
            if (gameOver) return;
            const isBomb = Math.random() > 0.75; 
            items.push({
                x: Math.random() * (canvas.width - 20),
                y: -20, width: 20, height: 20,
                isBomb: isBomb,
                pulse: 0 // For glowing animation
            });
        }

        function resetGame() {
            score = 0; lives = 3; gameOver = false; itemSpeed = 4;
            walletBalance = 0.00; comboMultiplier = 1; comboTimer = 0;
            items = []; particles = [];
            document.getElementById('score').innerText = score;
            document.getElementById('lives').innerText = lives;
            document.getElementById('balance').innerText = walletBalance.toFixed(2);
            document.getElementById('combo').innerText = 'COMBO: x1';
            document.getElementById('ad-overlay').style.display = 'none';
        }

        function triggerShake(magnitude, duration) {
            shakeMagnitude = magnitude;
            shakeTime = duration;
        }

        function update() {
            if (gameOver) return;

            // Player Movement
            if (keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) player.x += player.speed;

            // Combo Timer
            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer === 0) {
                    comboMultiplier = 1;
                    document.getElementById('combo').innerText = 'COMBO: x1';
                }
            }

            // Items Logic
            for (let i = items.length - 1; i >= 0; i--) {
                items[i].y += itemSpeed;
                items[i].pulse += 0.1;

                // Collision
                if (items[i].y + items[i].height >= player.y &&
                    items[i].x + items[i].width >= player.x &&
                    items[i].x <= player.x + player.width) {

                    if (items[i].isBomb) {
                        lives--;
                        createParticles(items[i].x + 10, items[i].y + 10, '#ff0000', 25); // Red explosion
                        triggerShake(10, 15); // Screen shake!
                        if (lives <= 0) gameOver = true;
                    } else {
                        let points = 10 * comboMultiplier;
                        score += points;
                        walletBalance += (0.50 * comboMultiplier);
                        
                        createParticles(items[i].x + 10, items[i].y + 10, '#ffd700', 15); // Gold explosion
                        
                        // Increase Combo
                        comboTimer = 60; // 1 second at 60fps
                        if (comboMultiplier < 5) comboMultiplier++;
                        document.getElementById('combo').innerText = `COMBO: x${comboMultiplier}`;
                        document.getElementById('combo').style.transform = 'scale(1.2)';
                        setTimeout(() => document.getElementById('combo').style.transform = 'scale(1)', 100);

                        if (score % 100 === 0) itemSpeed += 0.5; 
                    }
                    items.splice(i, 1);
                } 
                else if (items[i].y > canvas.height) {
                    if (!items[i].isBomb) {
                        lives--; 
                        comboMultiplier = 1; // Reset combo on miss
                        document.getElementById('combo').innerText = 'COMBO: x1';
                        if (lives <= 0) gameOver = true;
                    }
                    items.splice(i, 1);
                }
            }

            updateParticles();

            // Update UI
            document.getElementById('score').innerText = score;
            document.getElementById('lives').innerText = lives;
            document.getElementById('balance').innerText = walletBalance.toFixed(2);
        }

        function draw() {
            ctx.save(); // Save state for screen shake

            // Apply Screen Shake
            if (shakeTime > 0) {
                ctx.translate(Math.random() * shakeMagnitude - shakeMagnitude/2, Math.random() * shakeMagnitude - shakeMagnitude/2);
                shakeTime--;
            }

            ctx.clearRect(-10, -10, canvas.width + 20, canvas.height + 20); // Clear with shake offset

            // Draw Player (Neon Hovercraft)
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00ffcc';
            ctx.fillStyle = '#00ffcc';
            ctx.beginPath();
            ctx.ellipse(player.x + player.width/2, player.y + player.height/2, player.width/2, player.height/2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Draw Items
            items.forEach(item => {
                ctx.shadowBlur = 15 + Math.sin(item.pulse) * 5;
                if (item.isBomb) {
                    ctx.shadowColor = '#ff0000';
                    ctx.fillStyle = '#cc0000';
                    ctx.fillRect(item.x, item.y, item.width, item.height);
                    ctx.fillStyle = '#ff4444';
                    ctx.font = 'bold 16px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('X', item.x + 10, item.y + 16);
                } else {
                    ctx.shadowColor = '#ffd700';
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.arc(item.x + 10, item.y + 10, 12, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#b8860b';
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('₹', item.x + 10, item.y + 15);
                }
                ctx.shadowBlur = 0;
            });

            drawParticles();

            if (gameOver && !isWatchingAd) {
                document.getElementById('ad-overlay').style.display = 'block';
                document.getElementById('final-score').innerText = score;
            }

            ctx.restore(); // Restore state
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        setInterval(spawnItem, 800);
        loop();

        // --- AD LOGIC ---
        const reviveBtn = document.getElementById('revive-btn');
        const restartBtn = document.getElementById('restart-btn');
        const overlay = document.getElementById('ad-overlay');

        reviveBtn.addEventListener('click', () => {
            if (isWatchingAd) return;
            isWatchingAd = true;
            adTimer = 5;
            reviveBtn.innerText = `Watching Ad... ${adTimer}s`;
            reviveBtn.style.background = '#555';

            const adInterval = setInterval(() => {
                adTimer--;
                if (adTimer > 0) {
                    reviveBtn.innerText = `Watching Ad... ${adTimer}s`;
                } else {
                    clearInterval(adInterval);
                    walletBalance += 10.00; 
                    lives = 1;
                    items = [];
                    gameOver = false;
                    isWatchingAd = false;
                    overlay.style.display = 'none';
                    reviveBtn.innerText = '▶ WATCH AD TO REVIVE (+₹10)';
                    reviveBtn.style.background = 'linear-gradient(45deg, #ffd700, #ff8c00)';
                }
            }, 1000);
        });

        restartBtn.addEventListener('click', () => {
            resetGame();
            isWatchingAd = false;
        });
    </script>
</body>
</html>
